<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水辺リスク観測システム - ダッシュボード</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-800">

    <nav class="bg-blue-900 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-chart-line text-2xl text-cyan-400"></i>
            <h1 class="text-xl font-bold tracking-wider">水辺リスク観測システム <span class="text-xs bg-cyan-500 text-blue-950 px-2 py-0.5 rounded-full ml-2 font-mono">WSGI Mode</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <a href="/" class="text-sm bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded transition font-medium"><i class="fa-solid fa-pen-to-square mr-1"></i> 観測フォームへ</a>
            <span class="text-slate-300 text-sm">管理者用画面</span>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6 space-y-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div id="card-water" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider" id="water-card-label">多摩川 水位（二子玉川）</p>
                    <p class="text-2xl font-black mt-1 text-slate-700" id="live-water-level">読込中… <span class="text-sm font-normal text-slate-500" id="water-unit"></span></p>
                    <p class="text-[10px] text-slate-400 mt-1" id="water-updated"></p>
                </div>
                <div class="p-3 bg-blue-50 text-blue-600 rounded-lg"><i class="fa-solid fa-water text-xl"></i></div>
            </div>

            <div id="card-weather" class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-amber-500 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">気象庁 発表（世田谷区）</p>
                    <p class="text-lg font-bold mt-1 text-amber-600" id="live-weather-alerts"><i class="fa-solid fa-spinner fa-spin mr-1"></i> 取得中...</p>
                    <p class="text-[10px] text-slate-400 mt-1" id="weather-updated"></p>
                </div>
                <div class="p-3 bg-amber-50 text-amber-600 rounded-lg"><i class="fa-solid fa-cloud-showers-heavy text-xl"></i></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">本日の総観測件数</p>
                    <p class="text-2xl font-black mt-1 text-slate-700" id="total-count">- <span class="text-sm font-normal text-slate-500">件</span></p>
                </div>
                <div class="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><i class="fa-solid fa-clipboard-check text-xl"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-start">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">気温</p>
                    <p class="text-xl font-black mt-1 text-slate-700" id="live-temperature">- <span class="text-sm font-normal text-slate-500">℃</span></p>
                </div>
                <div class="p-2 bg-orange-50 text-orange-500 rounded-lg"><i class="fa-solid fa-temperature-half"></i></div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">湿度</p>
                    <p class="text-xl font-black mt-1 text-slate-700" id="live-humidity">- <span class="text-sm font-normal text-slate-500">%</span></p>
                </div>
                <div class="p-2 bg-sky-50 text-sky-500 rounded-lg"><i class="fa-solid fa-droplet"></i></div>
            </div>
            <div class="md:col-span-2 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-2">直近24時間の推移（水位・流量）</p>
                <div class="chart-wrap" style="position:relative; height:140px;">
                    <canvas id="trendChart" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
                </div>
                <p id="trendEmpty" class="text-xs text-slate-400 text-center py-4" style="display:none;">データ収集中です。運用開始から時間の経過とともに表示されます。</p>
            </div>
        </div>

      <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div class="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
    <h3 class="font-bold text-slate-700 flex items-center"><i class="fa-solid fa-database mr-2 text-blue-600"></i> パトロール観測データログ</h3>
    <div class="flex items-center space-x-3">
        <label class="text-sm bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold px-3 py-1.5 rounded-lg border border-blue-200 transition shadow-sm flex items-center cursor-pointer">
            <i class="fa-solid fa-file-import mr-1"></i> シートからデータインポート
            <input type="file" id="csvImportInput" accept=".csv" class="hidden" onchange="handleCsvImport(this)">
        </label>
        <button onclick="loadDashboard()" class="text-sm text-slate-500 hover:text-blue-600 font-medium transition"><i class="fa-solid fa-rotate mr-1"></i> 更新</button>
    </div>
</div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100/70 text-slate-500 text-xs font-bold uppercase tracking-wider border-b border-slate-100">
                            <th class="p-4 w-20 text-center">ID</th>
                            <th class="p-4 w-44">日時</th>
                            <th class="p-4 w-44">観測エリア</th>
                            <th class="p-4 w-32 text-center">リスク判定</th>
                            <th class="p-4">🤖 Gemini AI 一言サマリー</th>
                            <th class="p-4 w-40 text-center">アクション</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body" class="divide-y divide-slate-100 text-sm">
                        <tr><td colspan="6" class="p-8 text-center text-slate-400">観測ログを読み込み中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script>
        const AREA_BADGE = {
            '二子玉川バーベキュー場': 'bg-blue-50 text-blue-700',
            '兵庫島公園1': 'bg-sky-50 text-sky-700',
            '兵庫島公園2（多摩川側）': 'bg-indigo-50 text-indigo-700',
        };

        let trendChartInstance = null;

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderTrendChart(history) {
            const canvas = document.getElementById('trendChart');
            const chartWrap = canvas.closest('.chart-wrap');
            const trendEmpty = document.getElementById('trendEmpty');
            const levelSeries = (history && history.river_level) || [];
            const dischargeSeries = (history && history.river_discharge) || [];

            if (levelSeries.length < 2 && dischargeSeries.length < 2) {
                chartWrap.style.display = 'none';
                trendEmpty.style.display = 'block';
                return;
            }
            chartWrap.style.display = 'block';
            trendEmpty.style.display = 'none';

            const labelSource = levelSeries.length >= dischargeSeries.length ? levelSeries : dischargeSeries;
            const labels = labelSource.map(p => {
                const d = new Date(p.time);
                return isNaN(d) ? p.time : d.toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
            });

            const datasets = [];
            if (levelSeries.length >= 2) {
                datasets.push({
                    label: '実測水位 (m)', data: levelSeries.map(p => p.value),
                    borderColor: '#1f6f8b', backgroundColor: 'rgba(31,111,139,0.1)',
                    yAxisID: 'yLevel', tension: 0.3,
                });
            }
            if (dischargeSeries.length >= 2) {
                datasets.push({
                    label: '流量参考値 (m3/s)', data: dischargeSeries.map(p => p.value),
                    borderColor: '#b8791f', backgroundColor: 'rgba(184,121,31,0.1)',
                    yAxisID: 'yDischarge', tension: 0.3,
                });
            }

            if (trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(canvas, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true, labels: { font: { size: 10 } } } },
                    scales: {
                        yLevel: { type: 'linear', position: 'left', title: { display: true, text: 'm', font: {size: 9} } },
                        yDischarge: { type: 'linear', position: 'right', title: { display: true, text: 'm3/s', font: {size: 9} }, grid: { drawOnChartArea: false } },
                    },
                },
            });
        }

        // ---------- 気象庁・多摩川水位・気象実況カードの更新 ----------
        async function loadStatusCards() {
            try {
                const res = await fetch('/api/status');
                const s = await res.json();

                const waterEl = document.getElementById('live-water-level');
                const unitEl = document.getElementById('water-unit');
                const waterLabelEl = document.getElementById('water-card-label');
                const waterUpdatedEl = document.getElementById('water-updated');

                if (s.river_level_m !== null && s.river_level_m !== undefined) {
                    waterLabelEl.textContent = '多摩川 実測水位（二子橋付近）';
                    waterEl.innerHTML = `${s.river_level_m} <span class="text-sm font-normal text-slate-500">m</span>`;
                    unitEl.textContent = s.river_level_source === 'manual' ? '（スタッフ手動入力）' : '（契約API実測）';
                } else if (s.river_discharge_m3s !== null && s.river_discharge_m3s !== undefined) {
                    waterLabelEl.textContent = '多摩川 河川流量シミュレーション（参考値）';
                    waterEl.innerHTML = `${s.river_discharge_m3s} <span class="text-sm font-normal text-slate-500">m3/s</span>`;
                    unitEl.textContent = '(Open-Meteo GloFAS)';
                } else {
                    waterLabelEl.textContent = '多摩川 水位（二子玉川）';
                    waterEl.textContent = 'データなし';
                }
                waterUpdatedEl.textContent = s.fetched_at ? `更新: ${s.fetched_at}` : '';

                document.getElementById('live-temperature').innerHTML =
                    (s.temperature_c !== null && s.temperature_c !== undefined)
                        ? `${s.temperature_c} <span class="text-sm font-normal text-slate-500">℃</span>`
                        : '- <span class="text-sm font-normal text-slate-500">℃</span>';
                document.getElementById('live-humidity').innerHTML =
                    (s.humidity_pct !== null && s.humidity_pct !== undefined)
                        ? `${s.humidity_pct} <span class="text-sm font-normal text-slate-500">%</span>`
                        : '- <span class="text-sm font-normal text-slate-500">%</span>';

                const weatherEl = document.getElementById('live-weather-alerts');
                const weatherUpdatedEl = document.getElementById('weather-updated');
                const cardWeather = document.getElementById('card-weather');

                cardWeather.classList.remove('border-amber-500', 'border-red-500', 'border-emerald-500');
                weatherEl.classList.remove('text-amber-600', 'text-red-600', 'text-emerald-600');

                const joinedWarnings = (s.warnings && s.warnings.length) ? s.warnings.join('・') : '';

                if (joinedWarnings.trim() !== '') {
                    const isDanger = s.alert_level === 'danger';
                    cardWeather.classList.add(isDanger ? 'border-red-500' : 'border-amber-500');
                    weatherEl.classList.add(isDanger ? 'text-red-600' : 'text-amber-600');
                    weatherEl.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> ${escapeHtml(joinedWarnings)} 発令中`;
                } else {
                    cardWeather.classList.add('border-emerald-500');
                    weatherEl.classList.add('text-emerald-600');
                    weatherEl.innerHTML = `<i class="fa-solid fa-circle-check mr-1"></i> 警報・注意報なし`;
                }
                weatherUpdatedEl.textContent = s.jma_report_time ? `気象庁発表: ${s.jma_report_time}` : '';

                if (s.history_24h) {
                    renderTrendChart(s.history_24h);
                }
            } catch (err) {
                document.getElementById('live-weather-alerts').innerHTML =
                    `<i class="fa-solid fa-triangle-exclamation mr-1"></i> 取得失敗`;
            }
        }

        // ---------- 観測ログ一覧の更新 ----------
        function riskBadge(obs) {
            if (obs.danger_flags && obs.danger_flags.length > 0) {
                return `<span class="bg-amber-100 text-amber-800 font-bold px-2.5 py-1 rounded-full text-xs">要注意</span>`;
            }
            return `<span class="bg-emerald-100 text-emerald-800 font-bold px-2.5 py-1 rounded-full text-xs">正常</span>`;
        }

        function renderRow(obs) {
            const areaClass = AREA_BADGE[obs.area] || 'bg-slate-50 text-slate-700';
            const summaryText = obs.summary_preview
                ? escapeHtml(obs.summary_preview)
                : '<span class="text-slate-400 italic">（PDF出力時にAIが自動生成します）</span>';
            const bgClass = obs.danger_flags && obs.danger_flags.length > 0 ? 'bg-amber-50/30' : '';

            return `
                <tr class="hover:bg-slate-50/80 transition">
                    <td class="p-4 text-center font-mono text-slate-400">${obs.id}</td>
                    <td class="p-4 font-medium text-slate-600">${escapeHtml(obs.observation_date)} ${escapeHtml(obs.observation_time)}</td>
                    <td class="p-4"><span class="${areaClass} font-bold px-2.5 py-1 rounded-md text-xs">${escapeHtml(obs.area)}</span></td>
                    <td class="p-4 text-center">${riskBadge(obs)}</td>
                    <td class="p-4 text-slate-600 leading-relaxed font-normal ${bgClass}">${summaryText}</td>
                    <td class="p-4 text-center">
                        <a href="/api/report/${obs.id}/pdf" class="inline-flex items-center space-x-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold px-3 py-1.5 rounded-lg border border-red-200 transition text-xs shadow-sm">
                            <i class="fa-solid fa-file-pdf"></i>
                            <span>PDF出力</span>
                        </a>
                    </td>
                </tr>
            `;
        }

        async function loadObservations() {
            const tbody = document.getElementById('log-table-body');
            try {
                const res = await fetch('/api/observations');
                const data = await res.json();
                const observations = data.observations || [];

                document.getElementById('total-count').innerHTML =
                    `${data.today_count ?? 0} <span class="text-sm font-normal text-slate-500">件</span>`;

                if (observations.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-slate-400">観測データがまだありません。</td></tr>`;
                    return;
                }
                tbody.innerHTML = observations.map(renderRow).join('');
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500">読み込みに失敗しました: ${escapeHtml(err.message)}</td></tr>`;
            }
        }

        function loadDashboard() {
            loadStatusCards();
            loadObservations();
        }

        loadDashboard();
        setInterval(loadStatusCards, 5 * 60 * 1000);

        function handleCsvImport(input) {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];

            if (!confirm(`選択したCSVファイルからデータをシステムにインポートしますか？`)) {
                input.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/report/import/csv', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        alert(data.message);
                        loadDashboard();
                    } else {
                        alert(`エラー: ${data.error}`);
                    }
                    input.value = '';
                })
                .catch(err => {
                    alert('通信エラーが発生しました。');
                    input.value = '';
                });
        }
    </script>
</body>
</html>
